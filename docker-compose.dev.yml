services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: incus_manager
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d incus_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.multi
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/incus_manager?sslmode=disable
      INCUS_URL: http://host.docker.internal:8443
      JWT_SECRET: change-me-in-production
      PORT: "80"
    ports:
      - "80:80"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
