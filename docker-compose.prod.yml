services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: incus_manager
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d incus_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/fearless743/incus_manager:latest
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/incus_manager?sslmode=disable
      JWT_SECRET: change-me-in-production
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
