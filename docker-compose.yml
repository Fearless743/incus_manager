version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: incus_manager
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/incus_manager?sslmode=disable
      INCUS_URL: https://incus-server:8443
      JWT_SECRET: your-secret-key-here
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
